      <circle cx="12" cy="50" r="12"></circle><circle cx="88" cy="50" r="12"></circle>
      <circle cx="12" cy="88" r="12"></circle><circle cx="50" cy="88" r="12"></circle><circle cx="88" cy="88" r="12"></circle>
    </g>
