  </g>
  <text class="bf-wm" x="150" y="152" font-size="56" text-anchor="middle" dominant-baseline="central" fill="#2A333D"><tspan font-weight="500">Bid</tspan><tspan font-weight="700">Flare</tspan></text>
</svg>