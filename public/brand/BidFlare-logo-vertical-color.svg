<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 182" width="600" height="364" role="img" aria-label="BidFlare logo — vertical">
  <title>BidFlare logo — vertical, color</title>
  <defs>
    
    <radialGradient id="bf-glow-v" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#36F2A6" stop-opacity="0.55"></stop>
      <stop offset="45%" stop-color="#36F2A6" stop-opacity="0.20"></stop>
      <stop offset="100%" stop-color="#36F2A6" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  <g transform="translate(100,6)">
    <g fill="#C9D2D9">
