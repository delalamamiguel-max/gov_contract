query ListOpportunities @auth(level: PUBLIC) {
  opportunities(orderBy: [{ postedDate: DESC }]) {
    noticeId
    title
    agency
    description
    solicitationNumber
    naicsCode
    setAsideType
    postedDate
    responseDeadline
    estimatedValue
    sourceUrl
  }
}

query SearchOpportunities($keyword: String) @auth(level: PUBLIC) {
  opportunities(
    where: {
      _or: [
        { title: { contains: $keyword } },
        { agency: { contains: $keyword } },
        { naicsCode: { contains: $keyword } }
      ]
    },
    orderBy: [{ postedDate: DESC }]
  ) {
    noticeId
    title
    agency
    description
    solicitationNumber
    naicsCode
    setAsideType
    postedDate
    responseDeadline
    estimatedValue
    sourceUrl
  }
}

query ListPipelineApplications($tenantId: UUID!) @auth(level: USER) {
  pipelineApplications(where: {tenantId: {eq: $tenantId}}) {
    id
    opportunity {
      noticeId
      title
      agency
      responseDeadline
    }
    status
    fitScore
    createdAt
  }
}

query GetTenant($id: UUID!) @auth(level: PUBLIC) {
  tenant(id: $id) {
    id
    isPro
    tokensRemaining
  }
}
